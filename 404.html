<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // Save the short path (like /abc123)
    sessionStorage.setItem(
      "redirectPath",
      window.location.pathname
    );

    // Redirect ONLY once to index.html
    window.location.replace("/index.html");
  </script>
</head>
<body></body>
</html>
